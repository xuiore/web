  color:white;
}

/* เอฟเฟกต์เส้นแสง */
body::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(90deg, transparent 48%, #00b4d8 50%, transparent 52%);
  opacity:0.1;
  animation:scan 4s linear infinite;
}

@keyframes scan{
  0%{transform:translateX(-100%);}
  100%{transform:translateX(100%);}
}

.card{

  color:white;
  font-size:17px;
  cursor:pointer;
  transition:0.3s;
}
button:hover{
  transform:scale(1.1);
}
